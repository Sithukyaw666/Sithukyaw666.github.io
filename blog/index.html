<!DOCTYPE html>
<html lang="en" data-theme="mocha">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog — Sithu Kyaw</title>

    <!-- Apply theme before render to avoid flash -->
    <script>
      document.documentElement.setAttribute(
        "data-theme",
        localStorage.getItem("portfolio-theme") || "mocha"
      );
    </script>

    <link rel="stylesheet" href="../portfolio.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      .blog-header {
        padding: var(--space-20) 0 var(--space-12);
        text-align: center;
        background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      }

      .blog-header h1 {
        font-size: var(--font-size-4xl);
        font-weight: 800;
        color: var(--text-primary);
        margin-bottom: var(--space-4);
      }

      .blog-header p {
        color: var(--text-muted);
        font-size: var(--font-size-lg);
      }

      .posts-list {
        max-width: 760px;
        margin: 0 auto;
        padding: var(--space-12) var(--space-4) var(--space-20);
        display: flex;
        flex-direction: column;
        gap: var(--space-6);
      }

      .post-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-subtle);
        border-radius: var(--border-radius-lg);
        padding: var(--space-8);
        text-decoration: none;
        display: block;
        transition: var(--transition);
      }

      .post-card:hover {
        border-color: var(--primary);
        box-shadow: var(--shadow-medium);
        transform: translateY(-2px);
      }

      .post-meta {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        flex-wrap: wrap;
        margin-bottom: var(--space-4);
      }

      .post-date {
        font-family: var(--font-mono);
        font-size: var(--font-size-sm);
        color: var(--text-muted);
      }

      .post-tag {
        font-size: var(--font-size-xs);
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--bg-surface);
        color: var(--primary);
        border: 1px solid var(--border-subtle);
      }

      .post-title {
        font-size: var(--font-size-xl);
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: var(--space-3);
      }

      .post-excerpt {
        color: var(--text-secondary);
        font-size: var(--font-size-base);
        line-height: 1.6;
      }

      .post-arrow {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--primary);
        font-size: var(--font-size-sm);
        margin-top: var(--space-4);
        font-weight: 500;
      }

      .state-message {
        text-align: center;
        color: var(--text-muted);
        padding: var(--space-20) 0;
        font-size: var(--font-size-lg);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-4);
      }
    </style>
  </head>
  <body>
    <nav class="main-nav">
      <div class="nav-container">
        <div class="nav-brand">
          <a href="../" style="text-decoration: none">
            <span class="brand-text">STK</span>
          </a>
        </div>
        <ul class="nav-menu">
          <li><a href="../" class="nav-link">Portfolio</a></li>
          <li><a href="./" class="nav-link active">Blog</a></li>
        </ul>
        <div class="nav-actions">
          <button class="mode-toggle" onclick="window.location.href='../'">
            <i class="fas fa-arrow-left"></i>
            Back
          </button>
        </div>
      </div>
    </nav>

    <div class="blog-header">
      <div class="container">
        <h1>Blog</h1>
        <p>Things I did, broke, or somehow got working.</p>
      </div>
    </div>

    <div id="posts-container" class="posts-list">
      <div class="state-message">
        <i class="fas fa-spinner fa-spin"></i>
        Loading...
      </div>
    </div>

    <script>
      fetch("./posts.json")
        .then((r) => r.json())
        .then((posts) => {
          const container = document.getElementById("posts-container");

          if (!posts.length) {
            container.innerHTML = `
              <div class="state-message">
                <i class="fas fa-feather"></i>
                <span>No posts yet. Something will go wrong eventually.</span>
              </div>`;
            return;
          }

          container.innerHTML = posts
            .sort((a, b) => new Date(b.date) - new Date(a.date))
            .map(
              (post) => `
              <a href="./post.html?slug=${post.slug}" class="post-card">
                <div class="post-meta">
                  <span class="post-date">
                    <i class="fas fa-calendar-alt"></i> ${post.date}
                  </span>
                  ${(post.tags || []).map((t) => `<span class="post-tag">${t}</span>`).join("")}
                </div>
                <div class="post-title">${post.title}</div>
                <div class="post-excerpt">${post.excerpt}</div>
                <span class="post-arrow">Read more <i class="fas fa-arrow-right"></i></span>
              </a>`
            )
            .join("");
        })
        .catch(() => {
          document.getElementById("posts-container").innerHTML = `
            <div class="state-message">
              <i class="fas fa-bug"></i>
              <span>Failed to load posts. Classic.</span>
            </div>`;
        });
    </script>
  </body>
</html>
