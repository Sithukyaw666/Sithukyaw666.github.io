<!DOCTYPE html>
<html lang="en" data-theme="mocha">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post — Sithu Kyaw</title>

    <!-- Apply theme before render to avoid flash -->
    <script>
      document.documentElement.setAttribute(
        "data-theme",
        localStorage.getItem("portfolio-theme") || "mocha"
      );
    </script>

    <link rel="stylesheet" href="../portfolio.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
      .post-wrapper {
        max-width: 760px;
        margin: 0 auto;
        padding: var(--space-12) var(--space-4) var(--space-20);
      }

      .post-header {
        margin-bottom: var(--space-10);
        padding-bottom: var(--space-8);
        border-bottom: 1px solid var(--border-subtle);
      }

      .post-header h1 {
        font-size: var(--font-size-3xl);
        font-weight: 800;
        color: var(--text-primary);
        line-height: 1.3;
        margin-bottom: var(--space-4);
      }

      .post-meta {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        flex-wrap: wrap;
      }

      .post-date {
        font-family: var(--font-mono);
        font-size: var(--font-size-sm);
        color: var(--text-muted);
      }

      .post-tag {
        font-size: var(--font-size-xs);
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--bg-surface);
        color: var(--primary);
        border: 1px solid var(--border-subtle);
      }

      /* Prose styles for rendered markdown */
      .prose {
        color: var(--text-secondary);
        line-height: 1.8;
        font-size: var(--font-size-base);
      }

      .prose h1,
      .prose h2,
      .prose h3,
      .prose h4 {
        color: var(--text-primary);
        margin: var(--space-8) 0 var(--space-4);
        line-height: 1.3;
        font-weight: 700;
      }

      .prose h1 { font-size: var(--font-size-2xl); }
      .prose h2 { font-size: var(--font-size-xl); }
      .prose h3 { font-size: var(--font-size-lg); }

      .prose p { margin-bottom: var(--space-6); }

      .prose a {
        color: var(--primary);
        text-decoration: none;
      }

      .prose a:hover {
        text-decoration: underline;
      }

      .prose code {
        font-family: var(--font-mono);
        background: var(--bg-surface);
        color: var(--accent);
        padding: 0.15em 0.4em;
        border-radius: 4px;
        font-size: 0.875em;
      }

      .prose pre {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: var(--border-radius);
        padding: var(--space-6);
        overflow-x: auto;
        margin-bottom: var(--space-6);
      }

      .prose pre code {
        background: none;
        padding: 0;
        color: var(--text-primary);
        font-size: var(--font-size-sm);
      }

      .prose blockquote {
        border-left: 3px solid var(--primary);
        padding-left: var(--space-6);
        color: var(--text-muted);
        margin: var(--space-6) 0;
        font-style: italic;
      }

      .prose ul,
      .prose ol {
        padding-left: var(--space-8);
        margin-bottom: var(--space-6);
      }

      .prose li {
        margin-bottom: var(--space-2);
      }

      .prose hr {
        border: none;
        border-top: 1px solid var(--border-subtle);
        margin: var(--space-10) 0;
      }

      .prose img {
        max-width: 100%;
        border-radius: var(--border-radius);
        margin: var(--space-4) 0;
      }

      .prose strong {
        color: var(--text-primary);
        font-weight: 600;
      }

      .prose table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: var(--space-6);
        font-size: var(--font-size-sm);
      }

      .prose th,
      .prose td {
        padding: var(--space-3) var(--space-4);
        border: 1px solid var(--border-subtle);
        text-align: left;
      }

      .prose th {
        background: var(--bg-surface);
        color: var(--text-primary);
        font-weight: 600;
      }

      .state-message {
        text-align: center;
        color: var(--text-muted);
        padding: var(--space-20) 0;
        font-size: var(--font-size-lg);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-4);
      }
    </style>
  </head>
  <body>
    <nav class="main-nav">
      <div class="nav-container">
        <div class="nav-brand">
          <a href="../" style="text-decoration: none">
            <span class="brand-text">STK</span>
          </a>
        </div>
        <ul class="nav-menu">
          <li><a href="../" class="nav-link">Portfolio</a></li>
          <li><a href="./" class="nav-link">Blog</a></li>
        </ul>
        <div class="nav-actions">
          <button class="mode-toggle" onclick="window.location.href='./'">
            <i class="fas fa-arrow-left"></i>
            All Posts
          </button>
        </div>
      </div>
    </nav>

    <div class="post-wrapper">
      <header id="post-header" class="post-header" style="display: none"></header>

      <div id="loading" class="state-message">
        <i class="fas fa-spinner fa-spin"></i>
        <span>Loading...</span>
      </div>

      <article id="post-body" class="prose" style="display: none"></article>

      <div id="not-found" class="state-message" style="display: none">
        <i class="fas fa-ghost"></i>
        <span>Post not found. It probably never existed.</span>
        <a href="./" class="btn secondary">Back to Blog</a>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");

      if (!slug) {
        window.location.href = "./";
      } else {
        Promise.all([
          fetch("./posts.json").then((r) => r.json()),
          fetch(`./posts/${slug}.md`).then((r) => {
            if (!r.ok) throw new Error("not found");
            return r.text();
          }),
        ])
          .then(([posts, md]) => {
            const meta = posts.find((p) => p.slug === slug);

            document.getElementById("loading").style.display = "none";

            if (meta) {
              document.title = `${meta.title} — Sithu Kyaw`;
              const header = document.getElementById("post-header");
              header.style.display = "block";
              header.innerHTML = `
                <h1>${meta.title}</h1>
                <div class="post-meta">
                  <span class="post-date">
                    <i class="fas fa-calendar-alt"></i> ${meta.date}
                  </span>
                  ${(meta.tags || []).map((t) => `<span class="post-tag">${t}</span>`).join("")}
                </div>
              `;
            }

            const body = document.getElementById("post-body");
            body.style.display = "block";
            body.innerHTML = marked.parse(md);
          })
          .catch(() => {
            document.getElementById("loading").style.display = "none";
            document.getElementById("not-found").style.display = "flex";
          });
      }
    </script>
  </body>
</html>
